# Netlify deploy config for ArtempireMJ
# Site: artempiremj.com (custom domain pointed via GoDaddy DNS once cancelled)
# Stack: static React-CDN site (Babel-in-browser). v1.1 will migrate to Next.js.

[build]
  publish = "frontend"
  command = ""

[build.environment]
  NETLIFY_USE_YARN = "false"

# Single-page-app-style fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Strict security headers (sane defaults)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
