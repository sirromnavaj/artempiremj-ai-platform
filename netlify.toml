# Netlify deploy config — static React-CDN site, no build step

[build]
  base = ""
  publish = "frontend"
  command = "echo 'No build needed — static site at frontend/'"
  ignore = "/bin/false"

[build.environment]
  NETLIFY_USE_YARN = "false"
  NETLIFY_USE_PNPM = "false"

# SPA-style fallback for hash routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
