name: ArtempireMJ auto-update

# Runs the calendar's maintenance loop on the CLOUD (no laptop). Nightly: rebuild (which expires
# past-dated events and publishes data changes), deploy, self-verify, monitor SEO/AEO/ranking, learn
# source-weighting, and commit the updated posteriors. Discovery (the LLM agent that finds NEW events)
# is a separate, human/engine-triggered step — it needs a model, not just CI.
#
# REQUIRED SECRET: CLOUDFLARE_API_TOKEN  (repo Settings -> Secrets and variables -> Actions).

on:
  schedule:
    - cron: '0 3 * * *'        # nightly 03:00 UTC = 06:00 EAT
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install + build (build stamps today -> past events expire)
        working-directory: site
        run: npm ci && npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: a1f976627b1d8bc321a148f635f7a866
          CI: '1'
        run: npx wrangler pages deploy --branch main

      - name: Self-verify + monitor (SEO / AEO / ranking-readiness) + behavior recs
        run: |
          echo "::group::verify"; node scripts/verify-events.mjs || true; echo "::endgroup::"
          echo "::group::monitor"; node scripts/monitor.mjs || true; echo "::endgroup::"
          echo "::group::behavior"; node scripts/behavior-recommend.mjs || true; echo "::endgroup::"

      - name: Learn source-weighting + persist posteriors
        run: |
          node scripts/learn-sources.mjs || true
          git config user.name "artempiremj-bot"
          git config user.email "bot@users.noreply.github.com"
          git add site/src/data/source-posteriors.json 2>/dev/null || true
          git commit -m "auto: refresh learned source posteriors [skip ci]" || echo "no changes"
          git pull --rebase --autostash origin main || true
          git push || true
