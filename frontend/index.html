  <!-- Netlify Forms detection: hidden static forms so Netlify can register them at build time -->
  <form name="commission" data-netlify="true" netlify-honeypot="bot-field" hidden>

    <input type="text" name="location" />

    <input type="text" name="segment" />
    <textarea name="bio"></textarea>
    <input type="text" name="workLink" />

  </form>
  <form name="feedback" data-netlify="true" netlify-honeypot="bot-field" hidden>

    <input type="text" name="name" />
